<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>04. 강조 태그</title>
</head>
<body>
  <p><strong>중요한 내용</strong>입니다.</p>
  <p><b>굵은 글씨</b>입니다.</p>

  <!--

    <strong>은 의미적으로 중요한 것을 강조한 것을,
    <b>는 시각적인 굵은 글씨 표시에 불과함.

    (일반적 시각에서는 똑같이 보이지만,
    시각장애인에게 있어 스크린 리더 등을 사용할 때 확연한 차이가 있음.)

  -->

  <p><em>강조된 내용</em>입니다.</p>
  <p><i>기울인 글씨</i>입니다.</p>

</body>
</html>
