<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>08. 이미지</title>
</head>
<body>
  <h4> 이미지 태그 </h4>
  <hr>

  <!--

    [ 경로 지정 방식 ]

     - 절대 경로 방식 : 최상위 경로를 기준으로 하여 파일이 위치한 경로 정보를 입력
     - 상대 경로 방식 : 현재 html이 위치한 경로를 기준으로 파일의 경로 정보를 입력

  -->

  <!-- 절대 경로 방식

  <h5> 절대 경로 방식 </h5>
  <img src="C:/Users/user/Desktop/HTML_STUDY/html_study/img/logo.png" alt="">

   -->

  <!-- 상대 경로 방식

        . : 나
        .. : 나의 부모 파일

  -->
  <img src="./img/logo.png" alt="로고 이미지" width="40%" title="로고 이미지입니다.">

  <!--

    width 속성은 픽셀 값을 넣거나 비율을 넣는다.

    모바일 등의 호환을 위해서는 비율로 넣는 것이 권장됨.

  -->

  <br>
  <h4> 내가 고자라니... 말도 안돼... 말도 안 된다고호호호호호홓ㅎㅎ... 말도 안돼... </h4>
  <img src="https://image.chosun.com/sitedata/image/201711/01/2017110101202_0.png" alt="고자라니" width="60%" title="심영 사진입니다.">

</body>
</html>
