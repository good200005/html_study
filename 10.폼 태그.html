<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>10. 폼 태그</title>
</head>
<body>
  <form action="">
    <!--

      [form 태그 관련 속성]

       - action : 폼 입력 후 정보를 어떻게 할 것인지?
       - method : 전송 방식

    -->
    <label>
      ID : <input type="text" name="" id=""><br>
      PW : <input type="text" name="" id="">
    </label>

    <!--

        <label> 태그는 보이는 것은 아무런 의미는 없으나
        의미적으로 한 묶음임을 알 수 없고,
        문자 같은 것을 클릭해도 아무런 동작을 하지 않음.

      -->
  </form>
</body>
</html>
