<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>03. 단락 및 줄바꿈</title>
</head>
<body>
  <p>첫 번째 문단입니다.</p>
  <p>두 번째 문단입니다.<br>줄바꿈 한 문장입니다. </p>
  <hr><!-- <hr>는 수평선 태그로 닫는 태그가 없다. -->
  <p>세 번째 문단입니다.</p>
  <!-- p 태그의 목적 : 문단을 나누는 것이 목적(줄바꿈의 목적이 아님) -->
  <!-- br 태그가 줄바꿈의 목적을 위해 필요한 태그임. -->
  <!--

  header 태그 (<h1> ~ <h6> 태그)는 기본적으로 줄바꿈이 됨.
  (왜 그런가? 블록 속성(<-> 인라인 속성) 때문에)

  -->
</body>
</html>
