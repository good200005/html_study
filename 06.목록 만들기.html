<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>06. 목록 만들기</title>
</head>
<body>
  <!-- 순서 없는 목록(unordered list) -->
  <h3>내가 좋아하는 음식</h3>
  <ul>
    <li>피자</li>
    <li>파스타</li>
    <li>김치찌개</li>
  </ul>

  <!-- 순서 있는 목록(ordered list) / default는 1. 2. 3. ..으로 진행됨 -->
  <h3>내가 좋아하는 음식</h3>
  <ol>
    <li>피자</li>
    <li>파스타</li>
    <li>김치찌개</li>
  </ol>
</body>
</html>
